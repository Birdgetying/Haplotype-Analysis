<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manhattan Plot - Region chr4H:602,695,873-602,699,567</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;
                  padding: 20px 30px; border-radius: 10px 10px 0 0; }
        .header h1 { font-size: 22px; margin-bottom: 8px; }
        .header-info { font-size: 13px; opacity: 0.9; }
        .plot-container { padding: 30px; }
        #manhattan { width: 100%; height: 450px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .axis text { font-size: 11px; }
        .axis-label { font-size: 13px; font-weight: 600; }
        .threshold-line { stroke-dasharray: 5,5; }
        .legend { display: flex; gap: 20px; padding: 15px 30px; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Manhattan Plot</h1>
        <div class="header-info">Region: chr4H:602,695,873 - 602,699,567 | Variants: 21</div>
    </div>
    
    <div class="plot-container">
        <div id="manhattan"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3498db;"></div>Variants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>P &lt; 0.05</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8B0000;"></div>P &lt; 0.01</div>
        <div class="legend-item"><span style="color:#e74c3c;">---</span> P = 0.05</div>
        <div class="legend-item"><span style="color:#8B0000;">---</span> P = 0.01</div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 602696003, "pvalue": 2.9864068007163222e-05, "logp": 4.524851034094942, "type": "variant"}, {"pos": 602696443, "pvalue": 0.14488064503962744, "logp": 0.8389896291177473, "type": "variant"}, {"pos": 602696568, "pvalue": 0.0026762596584673426, "logp": 2.5724717523508445, "type": "variant"}, {"pos": 602696732, "pvalue": 0.0018379677554809142, "logp": 2.735662111959454, "type": "variant"}, {"pos": 602696870, "pvalue": 0.17313874675421803, "logp": 0.7616057304002091, "type": "variant"}, {"pos": 602696874, "pvalue": 5.3250166051046126e-11, "logp": 10.27367903361804, "type": "variant"}, {"pos": 602696881, "pvalue": 0.039153657734175715, "logp": 1.4072276599261893, "type": "variant"}, {"pos": 602697077, "pvalue": 0.5612963330169372, "logp": 0.2508077950433092, "type": "variant"}, {"pos": 602697144, "pvalue": 0.5612963330169372, "logp": 0.2508077950433092, "type": "variant"}, {"pos": 602697231, "pvalue": 0.0291166677604892, "logp": 1.5358583290856211, "type": "variant"}, {"pos": 602697388, "pvalue": 5.979061602820239e-05, "logp": 4.223366971980908, "type": "variant"}, {"pos": 602697458, "pvalue": 0.029558562773231593, "logp": 1.5293166864757664, "type": "variant"}, {"pos": 602697531, "pvalue": 0.0018379677554809142, "logp": 2.735662111959454, "type": "variant"}, {"pos": 602698880, "pvalue": 0.05255423220864624, "logp": 1.2793923043578896, "type": "variant"}, {"pos": 602699276, "pvalue": 0.17313874675421803, "logp": 0.7616057304002091, "type": "variant"}, {"pos": 602699308, "pvalue": 0.0018702982673088617, "logp": 2.7280891284811988, "type": "variant"}, {"pos": 602699324, "pvalue": 0.003837370049202506, "logp": 2.4159663184515296, "type": "variant"}, {"pos": 602699339, "pvalue": 0.0291166677604892, "logp": 1.5358583290856211, "type": "variant"}, {"pos": 602699359, "pvalue": 0.17313874675421803, "logp": 0.7616057304002091, "type": "variant"}, {"pos": 602699435, "pvalue": 9.191587636232392e-11, "logp": 10.036609467710324, "type": "variant"}, {"pos": 602699528, "pvalue": 0.037144561273629834, "logp": 1.4301047668769187, "type": "variant"}];
const margin = {top: 30, right: 40, bottom: 60, left: 70};
const container = document.getElementById('manhattan');
const width = container.clientWidth - margin.left - margin.right;
const height = 450 - margin.top - margin.bottom;

const svg = d3.select('#manhattan')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([602695873, 602699567])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp)) * 1.1 : 5;
const yScale = d3.scaleLinear()
    .domain([0, Math.max(maxLogP, 3)])
    .range([height, 0]);

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000000).toFixed(2) + 'M'));

svg.append('g')
    .call(d3.axisLeft(yScale));

// 坐标轴标签
svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('Position (Mb)');

svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2)
    .attr('y', -50)
    .attr('text-anchor', 'middle')
    .text('-log10(P-value)');

// 阈值线
const thresholds = [
    {value: -Math.log10(0.05), color: '#e74c3c', label: 'P=0.05'},
    {value: -Math.log10(0.01), color: '#8B0000', label: 'P=0.01'}
];

thresholds.forEach(t => {
    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))
            .attr('y2', yScale(t.value))
            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }
});

// 绘制点
const tooltip = d3.select('#tooltip');

svg.selectAll('circle')
    .data(data)
    .enter()
    .append('circle')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', d => yScale(d.logp))
    .attr('r', 5)
    .attr('fill', d => {
        if (d.pvalue < 0.01) return '#8B0000';
        if (d.pvalue < 0.05) return '#e74c3c';
        return '#3498db';
    })
    .attr('opacity', 0.7)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('opacity', 1);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue.toExponential(2)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px')
               .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('opacity', 0.7);
        tooltip.style('display', 'none');
    });
</script>
</body>
</html>
