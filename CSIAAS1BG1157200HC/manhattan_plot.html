];

    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))

            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }

        return '#3498db';
