<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manhattan Plot - Region chr5H:16,867,965-16,875,321</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;
                  padding: 20px 30px; border-radius: 10px 10px 0 0; }
        .header h1 { font-size: 22px; margin-bottom: 8px; }
        .header-info { font-size: 13px; opacity: 0.9; }
        .plot-container { padding: 30px; }
        #manhattan { width: 100%; height: 450px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .axis text { font-size: 11px; }
        .axis-label { font-size: 13px; font-weight: 600; }
        .threshold-line { stroke-dasharray: 5,5; }
        .legend { display: flex; gap: 20px; padding: 15px 30px; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Manhattan Plot</h1>
        <div class="header-info">Region: chr5H:16,867,965 - 16,875,321 | Variants: 41</div>
    </div>
    
    <div class="plot-container">
        <div id="manhattan"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3498db;"></div>Variants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>P &lt; 0.05</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8B0000;"></div>P &lt; 0.01</div>
        <div class="legend-item"><span style="color:#e74c3c;">---</span> P = 0.05</div>
        <div class="legend-item"><span style="color:#8B0000;">---</span> P = 0.01</div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 16868300, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16868744, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}, {"pos": 16869313, "pvalue": 0.13848811800682923, "logp": 0.8585874865665549, "type": "variant"}, {"pos": 16869340, "pvalue": 0.010980133905633674, "logp": 1.9593923635176942, "type": "variant"}, {"pos": 16870000, "pvalue": 0.7013736939444706, "logp": 0.1540505270045621, "type": "variant"}, {"pos": 16871197, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16871204, "pvalue": 0.003305725796288159, "logp": 2.4807331731776925, "type": "variant"}, {"pos": 16871338, "pvalue": 0.8364072137604189, "logp": 0.07758223017905067, "type": "variant"}, {"pos": 16871402, "pvalue": 0.9327896695949702, "logp": 0.030216272257813315, "type": "variant"}, {"pos": 16871615, "pvalue": 0.31431168034064977, "logp": 0.5026394795830096, "type": "variant"}, {"pos": 16872014, "pvalue": 0.007915088755876513, "logp": 2.10154421081157, "type": "variant"}, {"pos": 16872021, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16872023, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16872028, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16872118, "pvalue": 0.02774416134287575, "logp": 1.5568283986085518, "type": "variant"}, {"pos": 16872224, "pvalue": 0.205534506512989, "logp": 0.6871152553930883, "type": "variant"}, {"pos": 16872276, "pvalue": 0.015279142642029337, "logp": 1.8159010146269645, "type": "variant"}, {"pos": 16872296, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16872344, "pvalue": 0.00949468215632543, "logp": 2.022519569111737, "type": "variant"}, {"pos": 16872573, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16872650, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16872738, "pvalue": 0.007915088755876513, "logp": 2.10154421081157, "type": "variant"}, {"pos": 16872758, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16872763, "pvalue": 0.6869435236705415, "logp": 0.16307896653063833, "type": "variant"}, {"pos": 16872880, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16872920, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16873101, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16873211, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16873429, "pvalue": 0.006100900854543956, "logp": 2.214606032649693, "type": "variant"}, {"pos": 16873436, "pvalue": 0.02910587459080146, "logp": 1.5360193462415894, "type": "variant"}, {"pos": 16873553, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}, {"pos": 16873571, "pvalue": 0.007915088755876513, "logp": 2.10154421081157, "type": "variant"}, {"pos": 16873650, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}, {"pos": 16874059, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16874487, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16874498, "pvalue": 1.3904860747047926e-05, "logp": 4.8568333561052155, "type": "variant"}, {"pos": 16874549, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16874783, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}, {"pos": 16874819, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}, {"pos": 16875158, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 16875204, "pvalue": 0.322874262649564, "logp": 0.4909665726191413, "type": "variant"}];
const margin = {top: 30, right: 40, bottom: 60, left: 70};
const container = document.getElementById('manhattan');
const width = container.clientWidth - margin.left - margin.right;
const height = 450 - margin.top - margin.bottom;

const svg = d3.select('#manhattan')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([16867965, 16875321])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp)) * 1.1 : 5;
const yScale = d3.scaleLinear()
    .domain([0, Math.max(maxLogP, 3)])
    .range([height, 0]);

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000000).toFixed(2) + 'M'));

svg.append('g')
    .call(d3.axisLeft(yScale));

// 坐标轴标签
svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('Position (Mb)');

svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2)
    .attr('y', -50)
    .attr('text-anchor', 'middle')
    .text('-log10(P-value)');

// 阈值线
const thresholds = [
    {value: -Math.log10(0.05), color: '#e74c3c', label: 'P=0.05'},
    {value: -Math.log10(0.01), color: '#8B0000', label: 'P=0.01'}
];

thresholds.forEach(t => {
    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))
            .attr('y2', yScale(t.value))
            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }
});

// 绘制点
const tooltip = d3.select('#tooltip');

svg.selectAll('circle')
    .data(data)
    .enter()
    .append('circle')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', d => yScale(d.logp))
    .attr('r', 5)
    .attr('fill', d => {
        if (d.pvalue < 0.01) return '#8B0000';
        if (d.pvalue < 0.05) return '#e74c3c';
        return '#3498db';
    })
    .attr('opacity', 0.7)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('opacity', 1);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue.toExponential(2)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px')
               .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('opacity', 0.7);
        tooltip.style('display', 'none');
    });
</script>
</body>
</html>
