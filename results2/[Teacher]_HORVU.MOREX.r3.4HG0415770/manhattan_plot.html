<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manhattan Plot - Region chr4H:603,028,648-603,039,985</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;
                  padding: 20px 30px; border-radius: 10px 10px 0 0; }
        .header h1 { font-size: 22px; margin-bottom: 8px; }
        .header-info { font-size: 13px; opacity: 0.9; }
        .plot-container { padding: 30px; }
        #manhattan { width: 100%; height: 450px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .axis text { font-size: 11px; }
        .axis-label { font-size: 13px; font-weight: 600; }
        .threshold-line { stroke-dasharray: 5,5; }
        .legend { display: flex; gap: 20px; padding: 15px 30px; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Manhattan Plot</h1>
        <div class="header-info">Region: chr4H:603,028,648 - 603,039,985 | Variants: 33</div>
    </div>
    
    <div class="plot-container">
        <div id="manhattan"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3498db;"></div>Variants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>P &lt; 0.05</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8B0000;"></div>P &lt; 0.01</div>
        <div class="legend-item"><span style="color:#e74c3c;">---</span> P = 0.05</div>
        <div class="legend-item"><span style="color:#8B0000;">---</span> P = 0.01</div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 603031671, "pvalue": 2.6095415529158147e-06, "logp": 5.5834357832851005, "type": "variant"}, {"pos": 603031760, "pvalue": 0.279381246141383, "logp": 0.5538027498706121, "type": "variant"}, {"pos": 603031934, "pvalue": 0.2306529242219546, "logp": 0.6370410350274971, "type": "variant"}, {"pos": 603032061, "pvalue": 0.0009978062287013655, "logp": 3.0009537893503455, "type": "variant"}, {"pos": 603032218, "pvalue": 0.051717563444416574, "logp": 1.2863619441081802, "type": "variant"}, {"pos": 603032898, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603033097, "pvalue": 5.05145796456151e-13, "logp": 12.296583256618128, "type": "variant"}, {"pos": 603033292, "pvalue": 0.8688909610584399, "logp": 0.06103472065357455, "type": "variant"}, {"pos": 603033311, "pvalue": 0.26645410891212523, "logp": 0.5743775782412207, "type": "variant"}, {"pos": 603033370, "pvalue": 0.04271487171057475, "logp": 1.3694208936548327, "type": "variant"}, {"pos": 603033476, "pvalue": 0.21861064503289082, "logp": 0.6603286943237169, "type": "variant"}, {"pos": 603034098, "pvalue": 0.2306529242219546, "logp": 0.6370410350274971, "type": "variant"}, {"pos": 603034150, "pvalue": 0.352465513453088, "logp": 0.4528833695937691, "type": "variant"}, {"pos": 603034156, "pvalue": 2.7205761245624985e-06, "logp": 5.565339117574694, "type": "variant"}, {"pos": 603034274, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603034358, "pvalue": 0.49589703805648266, "logp": 0.30460848569874066, "type": "variant"}, {"pos": 603034370, "pvalue": 1.7433659913336303e-09, "logp": 8.758611430255941, "type": "variant"}, {"pos": 603035014, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603035085, "pvalue": 0.16998221413836273, "logp": 0.7695965180667957, "type": "variant"}, {"pos": 603035808, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603036111, "pvalue": 0.5048759349968552, "logp": 0.2968153295365405, "type": "variant"}, {"pos": 603036476, "pvalue": 0.8688909610584399, "logp": 0.06103472065357455, "type": "variant"}, {"pos": 603036500, "pvalue": 0.0049682763198680285, "logp": 2.3037942580696535, "type": "variant"}, {"pos": 603036652, "pvalue": 0.8640215375715159, "logp": 0.06347543167402082, "type": "variant"}, {"pos": 603036675, "pvalue": 1.437891756762786e-07, "logp": 6.84227380603241, "type": "variant"}, {"pos": 603036801, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603036908, "pvalue": 0.08474598718490142, "logp": 1.0718808569563134, "type": "variant"}, {"pos": 603037355, "pvalue": 0.2306529242219546, "logp": 0.6370410350274971, "type": "variant"}, {"pos": 603037889, "pvalue": 0.07074298663077154, "logp": 1.1503166090691448, "type": "variant"}, {"pos": 603037985, "pvalue": 5.7742690066699975e-11, "logp": 10.238502987446815, "type": "variant"}, {"pos": 603038159, "pvalue": 2.8751527523066883e-09, "logp": 8.541339076984228, "type": "variant"}, {"pos": 603039339, "pvalue": 0.05534686566171769, "logp": 1.256906968540694, "type": "variant"}, {"pos": 603039384, "pvalue": 2.7231942819582976e-07, "logp": 6.564921373506701, "type": "variant"}];
const margin = {top: 30, right: 40, bottom: 60, left: 70};
const container = document.getElementById('manhattan');
const width = container.clientWidth - margin.left - margin.right;
const height = 450 - margin.top - margin.bottom;

const svg = d3.select('#manhattan')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([603028648, 603039985])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp)) * 1.1 : 5;
const yScale = d3.scaleLinear()
    .domain([0, Math.max(maxLogP, 3)])
    .range([height, 0]);

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000000).toFixed(2) + 'M'));

svg.append('g')
    .call(d3.axisLeft(yScale));

// 坐标轴标签
svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('Position (Mb)');

svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2)
    .attr('y', -50)
    .attr('text-anchor', 'middle')
    .text('-log10(P-value)');

// 阈值线
const thresholds = [
    {value: -Math.log10(0.05), color: '#e74c3c', label: 'P=0.05'},
    {value: -Math.log10(0.01), color: '#8B0000', label: 'P=0.01'}
];

thresholds.forEach(t => {
    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))
            .attr('y2', yScale(t.value))
            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }
});

// 绘制点
const tooltip = d3.select('#tooltip');

svg.selectAll('circle')
    .data(data)
    .enter()
    .append('circle')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', d => yScale(d.logp))
    .attr('r', 5)
    .attr('fill', d => {
        if (d.pvalue < 0.01) return '#8B0000';
        if (d.pvalue < 0.05) return '#e74c3c';
        return '#3498db';
    })
    .attr('opacity', 0.7)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('opacity', 1);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue.toExponential(2)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px')
               .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('opacity', 0.7);
        tooltip.style('display', 'none');
    });
</script>
</body>
</html>
