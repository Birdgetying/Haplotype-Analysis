<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr7H:586,821,015 - 586,829,841 | Gene: 586,821,015 - 586,829,841 | Variants: 67</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 586821204, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586821387, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586821568, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586821667, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586821841, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822013, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822101, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822127, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822156, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822270, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822301, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822331, "pvalue": 0.9216748819597689, "logp": 0.03542224800419616, "significant": false}, {"pos": 586822421, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586822712, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823038, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823214, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823249, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823349, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823368, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823385, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823414, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586823936, "pvalue": 0.773896676317944, "logp": 0.11131701851652041, "significant": false}, {"pos": 586823937, "pvalue": 0.5878395379032245, "logp": 0.23074120677017332, "significant": false}, {"pos": 586824111, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824254, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824289, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824294, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824384, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824393, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824529, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824572, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824758, "pvalue": 0.5878395379032245, "logp": 0.23074120677017332, "significant": false}, {"pos": 586824801, "pvalue": 0.05790207266002892, "logp": 1.2373058900082727, "significant": false}, {"pos": 586824824, "pvalue": 0.34971180902553445, "logp": 0.4562897022402708, "significant": false}, {"pos": 586824835, "pvalue": 0.773896676317944, "logp": 0.11131701851652041, "significant": false}, {"pos": 586824852, "pvalue": 0.8196711395061778, "logp": 0.08636035608559998, "significant": false}, {"pos": 586824864, "pvalue": 0.006960525529276585, "logp": 2.157357969319226, "significant": true}, {"pos": 586824871, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824927, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824937, "pvalue": 0.006960525529276585, "logp": 2.157357969319226, "significant": true}, {"pos": 586824957, "pvalue": 0.773896676317944, "logp": 0.11131701851652041, "significant": false}, {"pos": 586824966, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824970, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824981, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586824988, "pvalue": 0.041217903389191964, "logp": 1.3849141030386691, "significant": true}, {"pos": 586824997, "pvalue": 0.020905989432928887, "logp": 1.6797292734571407, "significant": true}, {"pos": 586825057, "pvalue": 0.23821807880637116, "logp": 0.6230252821987261, "significant": false}, {"pos": 586825129, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825150, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825154, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825159, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825306, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825329, "pvalue": 0.34971180902553445, "logp": 0.4562897022402708, "significant": false}, {"pos": 586825334, "pvalue": 0.1908027848073366, "logp": 0.7194152909650815, "significant": false}, {"pos": 586825361, "pvalue": 0.12547032764788424, "logp": 0.9014589679074944, "significant": false}, {"pos": 586825389, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825479, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825904, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586825952, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586826096, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586826168, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 586826425, "pvalue": 0.00934017387373988, "logp": 2.0296450390051404, "significant": true}, {"pos": 586826441, "pvalue": 0.00934017387373988, "logp": 2.0296450390051404, "significant": true}, {"pos": 586826454, "pvalue": 0.15733972670791535, "logp": 0.8031616085163692, "significant": false}, {"pos": 586826540, "pvalue": 0.006960525529276585, "logp": 2.157357969319226, "significant": true}, {"pos": 586826547, "pvalue": 0.6774851980668377, "logp": 0.16910018896738443, "significant": false}, {"pos": 586826771, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 586821015;
const regionEnd = 586829841;
const geneStart = 586821015;
const geneEnd = 586829841;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
