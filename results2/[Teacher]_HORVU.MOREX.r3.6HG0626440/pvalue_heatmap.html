<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr6H:544,363,259 - 544,374,265 | Gene: 544,363,259 - 544,374,265 | Variants: 69</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 544368003, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368030, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368036, "pvalue": 0.3219313233966857, "logp": 0.4922367651083892, "significant": false}, {"pos": 544368222, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368246, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368251, "pvalue": 0.97036874644386, "logp": 0.013063199636899904, "significant": false}, {"pos": 544368254, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368259, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368608, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368808, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368827, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368833, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368896, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368909, "pvalue": 9.218272725817088e-07, "logp": 6.035350447267549, "significant": true}, {"pos": 544368939, "pvalue": 0.023316580059293053, "logp": 1.6323351490372473, "significant": true}, {"pos": 544368956, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544368957, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544369133, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544369140, "pvalue": 0.06315510013951085, "logp": 1.1995915719018637, "significant": false}, {"pos": 544369168, "pvalue": 0.00022385117742693857, "logp": 3.650040616944251, "significant": true}, {"pos": 544369397, "pvalue": 0.010066365600115893, "logp": 1.9971273005204857, "significant": true}, {"pos": 544369472, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544369493, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544369968, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370307, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370646, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370703, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370754, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370785, "pvalue": 0.05569766049502143, "logp": 1.2541630463961249, "significant": false}, {"pos": 544370944, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544370962, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371202, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371251, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371276, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371326, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371381, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371405, "pvalue": 0.2604171354848264, "logp": 0.5843304425244977, "significant": false}, {"pos": 544371439, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371472, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371625, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371701, "pvalue": 0.9432281067282253, "logp": 0.025383266421128838, "significant": false}, {"pos": 544371949, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544371950, "pvalue": 0.13220463167041854, "logp": 0.8787533294671058, "significant": false}, {"pos": 544372031, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372032, "pvalue": 0.2512696678684636, "logp": 0.5998599342980552, "significant": false}, {"pos": 544372052, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372163, "pvalue": 0.9432281067282253, "logp": 0.025383266421128838, "significant": false}, {"pos": 544372437, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372622, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372899, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372917, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372925, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544372937, "pvalue": 0.006654027633647411, "logp": 2.1769153998730175, "significant": true}, {"pos": 544373023, "pvalue": 0.0346127930504513, "logp": 1.4607633542610272, "significant": true}, {"pos": 544373030, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373058, "pvalue": 0.6156559255829939, "logp": 0.21066193616203202, "significant": false}, {"pos": 544373075, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373268, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373315, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373364, "pvalue": 0.9432281067282253, "logp": 0.025383266421128838, "significant": false}, {"pos": 544373379, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373524, "pvalue": 0.5106691807265367, "logp": 0.291860351355895, "significant": false}, {"pos": 544373680, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373824, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373903, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373909, "pvalue": 0.348630739621243, "logp": 0.4576343227357467, "significant": false}, {"pos": 544373984, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544373990, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 544374128, "pvalue": 0.348630739621243, "logp": 0.4576343227357467, "significant": false}];
const regionStart = 544363259;
const regionEnd = 544374265;
const geneStart = 544363259;
const geneEnd = 544374265;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
