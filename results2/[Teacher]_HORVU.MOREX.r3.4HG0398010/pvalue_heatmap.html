<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr4H:540,397,674 - 540,406,398 | Gene: 540,397,674 - 540,406,398 | Variants: 62</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 540400676, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540400794, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540400807, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540400839, "pvalue": 0.9056590097232812, "logp": 0.04303528805258261, "significant": false}, {"pos": 540400933, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540400966, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540400967, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401013, "pvalue": 0.3503404218212295, "logp": 0.4555097514601138, "significant": false}, {"pos": 540401020, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401034, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401159, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401232, "pvalue": 0.3503404218212295, "logp": 0.4555097514601138, "significant": false}, {"pos": 540401282, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401326, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401444, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401468, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401567, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401617, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540401645, "pvalue": 0.01109153504029715, "logp": 1.9550083444372754, "significant": true}, {"pos": 540401661, "pvalue": 0.02234693448817866, "logp": 1.6507820441731673, "significant": true}, {"pos": 540401921, "pvalue": 0.002062513090873526, "logp": 2.6856032862805375, "significant": true}, {"pos": 540401999, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402015, "pvalue": 0.022301629679282044, "logp": 1.6516633999626367, "significant": true}, {"pos": 540402033, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402038, "pvalue": 8.400575530582288e-05, "logp": 4.0756909590341035, "significant": true}, {"pos": 540402085, "pvalue": 0.2999916024676036, "logp": 0.5228909021237553, "significant": false}, {"pos": 540402092, "pvalue": 0.8724799219894495, "logp": 0.05924455848857745, "significant": false}, {"pos": 540402101, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402135, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402158, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402183, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402458, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402579, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402652, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402729, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540402950, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403052, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403097, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403211, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403286, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403365, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403455, "pvalue": 0.014705300012295756, "logp": 1.8325261107451174, "significant": true}, {"pos": 540403572, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403586, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540403595, "pvalue": 0.00023429042725612445, "logp": 3.630245455640224, "significant": true}, {"pos": 540404568, "pvalue": 0.002062513090873526, "logp": 2.6856032862805375, "significant": true}, {"pos": 540404752, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540404990, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405062, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405236, "pvalue": 0.3503404218212295, "logp": 0.4555097514601138, "significant": false}, {"pos": 540405254, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405287, "pvalue": 0.16644253817108506, "logp": 0.7787356700402809, "significant": false}, {"pos": 540405324, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405693, "pvalue": 0.028821233403548054, "logp": 1.5402874375090894, "significant": true}, {"pos": 540405722, "pvalue": 0.022301629679282044, "logp": 1.6516633999626367, "significant": true}, {"pos": 540405729, "pvalue": 0.002062513090873526, "logp": 2.6856032862805375, "significant": true}, {"pos": 540405847, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405857, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540405898, "pvalue": 1.3456716551199353e-06, "logp": 5.871060895361086, "significant": true}, {"pos": 540406094, "pvalue": 0.0005381618658077908, "logp": 3.2690870796231897, "significant": true}, {"pos": 540406181, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 540406382, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 540397674;
const regionEnd = 540406398;
const geneStart = 540397674;
const geneEnd = 540406398;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
