<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr6H:9,440,142 - 9,445,419 | Gene: 9,440,142 - 9,445,419 | Variants: 50</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 9440194, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9440343, "pvalue": 0.007240451318380291, "logp": 2.1402343621214674, "significant": true}, {"pos": 9440458, "pvalue": 6.855348527942395e-05, "logp": 4.163970460653547, "significant": true}, {"pos": 9440500, "pvalue": 0.0004422419387717678, "logp": 3.3543400747073204, "significant": true}, {"pos": 9440746, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9440986, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9440989, "pvalue": 0.10431736753864583, "logp": 0.9816433809475175, "significant": false}, {"pos": 9441144, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9441224, "pvalue": 0.4054818134255036, "logp": 0.392028619889503, "significant": false}, {"pos": 9441417, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9441755, "pvalue": 0.0025043150773955813, "logp": 2.601311031785106, "significant": true}, {"pos": 9441789, "pvalue": 1.6884273595321652e-06, "logp": 5.772517619087177, "significant": true}, {"pos": 9441975, "pvalue": 0.40230841548692775, "logp": 0.3954408827622971, "significant": false}, {"pos": 9442296, "pvalue": 0.0070519017343677465, "logp": 2.151693748062901, "significant": true}, {"pos": 9442740, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9442816, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9442942, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443005, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443047, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443053, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443152, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443227, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443239, "pvalue": 0.0698721248266542, "logp": 1.1556960495543087, "significant": false}, {"pos": 9443331, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443491, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443540, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443555, "pvalue": 0.011506787023620752, "logp": 1.9390459250848637, "significant": true}, {"pos": 9443578, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443584, "pvalue": 0.9896261601669999, "logp": 0.0045288329161134394, "significant": false}, {"pos": 9443607, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9443665, "pvalue": 0.009111363369774273, "logp": 2.040416632942687, "significant": true}, {"pos": 9443760, "pvalue": 0.00017051718473777588, "logp": 3.7682318462274744, "significant": true}, {"pos": 9444571, "pvalue": 0.4450462551845922, "logp": 0.35159484895734944, "significant": false}, {"pos": 9444587, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9444662, "pvalue": 0.4450462551845922, "logp": 0.35159484895734944, "significant": false}, {"pos": 9444688, "pvalue": 0.784914856235714, "logp": 0.10517745086301966, "significant": false}, {"pos": 9444737, "pvalue": 0.1500522836793615, "logp": 0.8237573905637007, "significant": false}, {"pos": 9444752, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9444773, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9444903, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9444958, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9445005, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9445068, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9445114, "pvalue": 0.9824690247199861, "logp": 0.007681133171616325, "significant": false}, {"pos": 9445140, "pvalue": 0.49612992852316107, "logp": 0.3044045738095848, "significant": false}, {"pos": 9445172, "pvalue": 0.5117073447778211, "logp": 0.29097834934880107, "significant": false}, {"pos": 9445385, "pvalue": 0.18513561739863255, "logp": 0.7325100212706557, "significant": false}, {"pos": 9445393, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 9445401, "pvalue": 0.7916394543782765, "logp": 0.10147256920063916, "significant": false}, {"pos": 9445419, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 9440142;
const regionEnd = 9445419;
const geneStart = 9440142;
const geneEnd = 9445419;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
