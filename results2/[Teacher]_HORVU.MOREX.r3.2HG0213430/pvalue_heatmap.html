<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr2H:654,176,745 - 654,183,187 | Gene: 654,176,745 - 654,183,187 | Variants: 64</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 654179791, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180059, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180235, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180244, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180327, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180482, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654180595, "pvalue": 0.301997789953469, "logp": 0.5199962352366413, "significant": false}, {"pos": 654180607, "pvalue": 2.793192114880278e-06, "logp": 5.5538991926330326, "significant": true}, {"pos": 654180945, "pvalue": 0.8799437791934276, "logp": 0.05554507462942685, "significant": false}, {"pos": 654181086, "pvalue": 0.0007732244707674208, "logp": 3.111694410009381, "significant": true}, {"pos": 654181116, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181142, "pvalue": 0.0007732244707674208, "logp": 3.111694410009381, "significant": true}, {"pos": 654181268, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181352, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181436, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181526, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181660, "pvalue": 0.016401694253045128, "logp": 1.7851112881264628, "significant": true}, {"pos": 654181665, "pvalue": 0.40508005948879156, "logp": 0.3924591349135014, "significant": false}, {"pos": 654181700, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181710, "pvalue": 0.9055361036658478, "logp": 0.04309422971184741, "significant": false}, {"pos": 654181749, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181757, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181815, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181882, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181923, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181926, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654181960, "pvalue": 0.7342376633824876, "logp": 0.13416334173389322, "significant": false}, {"pos": 654181984, "pvalue": 0.005159806417375678, "logp": 2.2873665916756174, "significant": true}, {"pos": 654181985, "pvalue": 0.711465850122658, "logp": 0.14784594091943415, "significant": false}, {"pos": 654181986, "pvalue": 0.005159806417375678, "logp": 2.2873665916756174, "significant": true}, {"pos": 654181989, "pvalue": 0.29422067705936056, "logp": 0.5313268094561032, "significant": false}, {"pos": 654182003, "pvalue": 0.0015379155580380903, "logp": 2.8130675095832673, "significant": true}, {"pos": 654182033, "pvalue": 0.8291638742889968, "logp": 0.08135962787426772, "significant": false}, {"pos": 654182034, "pvalue": 0.013569078400903885, "logp": 1.8674496482130565, "significant": true}, {"pos": 654182140, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182161, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182171, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182182, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182214, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182245, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182265, "pvalue": 0.5932700854230086, "logp": 0.22674754962858826, "significant": false}, {"pos": 654182280, "pvalue": 0.5932700854230086, "logp": 0.22674754962858826, "significant": false}, {"pos": 654182299, "pvalue": 0.007579640548599963, "logp": 2.120351389547506, "significant": true}, {"pos": 654182378, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182396, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182401, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182411, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182414, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182777, "pvalue": 0.3603612408835476, "logp": 0.4432619262823386, "significant": false}, {"pos": 654182801, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182812, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182816, "pvalue": 0.6529264851153183, "logp": 0.1851357144463203, "significant": false}, {"pos": 654182830, "pvalue": 0.0721019234427836, "logp": 1.142053149573983, "significant": false}, {"pos": 654182833, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182854, "pvalue": 0.6529264851153183, "logp": 0.1851357144463203, "significant": false}, {"pos": 654182886, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182907, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654182909, "pvalue": 0.6529264851153183, "logp": 0.1851357144463203, "significant": false}, {"pos": 654182977, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654183049, "pvalue": 0.05562543421323544, "logp": 1.2547265858864978, "significant": false}, {"pos": 654183075, "pvalue": 0.8010106769403541, "logp": 0.09636169502016231, "significant": false}, {"pos": 654183122, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654183128, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 654183145, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 654176745;
const regionEnd = 654183187;
const geneStart = 654176745;
const geneEnd = 654183187;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
