<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manhattan Plot - Region chr1H:485,701,418-485,707,526</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;
                  padding: 20px 30px; border-radius: 10px 10px 0 0; }
        .header h1 { font-size: 22px; margin-bottom: 8px; }
        .header-info { font-size: 13px; opacity: 0.9; }
        .plot-container { padding: 30px; }
        #manhattan { width: 100%; height: 450px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .axis text { font-size: 11px; }
        .axis-label { font-size: 13px; font-weight: 600; }
        .threshold-line { stroke-dasharray: 5,5; }
        .legend { display: flex; gap: 20px; padding: 15px 30px; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Manhattan Plot</h1>
        <div class="header-info">Region: chr1H:485,701,418 - 485,707,526 | Variants: 32</div>
    </div>
    
    <div class="plot-container">
        <div id="manhattan"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3498db;"></div>Variants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>P &lt; 0.05</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8B0000;"></div>P &lt; 0.01</div>
        <div class="legend-item"><span style="color:#e74c3c;">---</span> P = 0.05</div>
        <div class="legend-item"><span style="color:#8B0000;">---</span> P = 0.01</div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 485701461, "pvalue": 1.6878742720014092e-05, "logp": 4.772659906649711, "type": "variant"}, {"pos": 485701731, "pvalue": 0.8573172794218333, "logp": 0.06685842288247348, "type": "variant"}, {"pos": 485701823, "pvalue": 0.00021447262275961146, "logp": 3.6686281372473615, "type": "variant"}, {"pos": 485701825, "pvalue": 0.023338037896919926, "logp": 1.6319356592743788, "type": "variant"}, {"pos": 485701873, "pvalue": 0.0002011115803590636, "logp": 3.696562921241948, "type": "variant"}, {"pos": 485702912, "pvalue": 0.0002011115803590636, "logp": 3.696562921241948, "type": "variant"}, {"pos": 485702923, "pvalue": 0.00015886690478051488, "logp": 3.798966565776874, "type": "variant"}, {"pos": 485702999, "pvalue": 0.030506896063669773, "logp": 1.5156019775754104, "type": "variant"}, {"pos": 485703117, "pvalue": 0.00021447262275961146, "logp": 3.6686281372473615, "type": "variant"}, {"pos": 485703251, "pvalue": 0.5730035268322957, "logp": 0.24184270494519142, "type": "variant"}, {"pos": 485703259, "pvalue": 0.13582327863614455, "logp": 0.8670257903145692, "type": "variant"}, {"pos": 485703270, "pvalue": 0.0768531123019961, "logp": 1.1143385402889763, "type": "variant"}, {"pos": 485703284, "pvalue": 0.04526102409360572, "logp": 1.3442756237535782, "type": "variant"}, {"pos": 485703303, "pvalue": 0.5730035268322957, "logp": 0.24184270494519142, "type": "variant"}, {"pos": 485703418, "pvalue": 0.8427044460758064, "logp": 0.07432471475195854, "type": "variant"}, {"pos": 485703435, "pvalue": 0.030506896063669773, "logp": 1.5156019775754104, "type": "variant"}, {"pos": 485703446, "pvalue": 0.5730035268322957, "logp": 0.24184270494519142, "type": "variant"}, {"pos": 485703523, "pvalue": 0.5730035268322957, "logp": 0.24184270494519142, "type": "variant"}, {"pos": 485704830, "pvalue": 0.2211683120467962, "logp": 0.655277096576392, "type": "variant"}, {"pos": 485705240, "pvalue": 0.2211683120467962, "logp": 0.655277096576392, "type": "variant"}, {"pos": 485705255, "pvalue": 0.09444287331839929, "logp": 1.0248308084702389, "type": "variant"}, {"pos": 485705275, "pvalue": 0.1317871742778844, "logp": 0.8801268538647675, "type": "variant"}, {"pos": 485705338, "pvalue": 9.98366458758974e-05, "logp": 4.00071001802682, "type": "variant"}, {"pos": 485705451, "pvalue": 0.3571277564362446, "logp": 0.4471763945603916, "type": "variant"}, {"pos": 485705484, "pvalue": 0.09168582109340136, "logp": 1.0376978213312211, "type": "variant"}, {"pos": 485705516, "pvalue": 0.5485173619052669, "logp": 0.2608096213977131, "type": "variant"}, {"pos": 485705573, "pvalue": 0.8573172794218333, "logp": 0.06685842288247348, "type": "variant"}, {"pos": 485705788, "pvalue": 0.023338037896919926, "logp": 1.6319356592743788, "type": "variant"}, {"pos": 485705910, "pvalue": 0.19002656724764228, "logp": 0.7211856769289636, "type": "variant"}, {"pos": 485706630, "pvalue": 0.1404500649048444, "logp": 0.852478055766004, "type": "variant"}, {"pos": 485707334, "pvalue": 0.26154692487091047, "logp": 0.5824503818091539, "type": "variant"}, {"pos": 485707364, "pvalue": 0.10713781776885484, "logp": 0.9700572037779478, "type": "variant"}];
const margin = {top: 30, right: 40, bottom: 60, left: 70};
const container = document.getElementById('manhattan');
const width = container.clientWidth - margin.left - margin.right;
const height = 450 - margin.top - margin.bottom;

const svg = d3.select('#manhattan')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([485701418, 485707526])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp)) * 1.1 : 5;
const yScale = d3.scaleLinear()
    .domain([0, Math.max(maxLogP, 3)])
    .range([height, 0]);

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000000).toFixed(2) + 'M'));

svg.append('g')
    .call(d3.axisLeft(yScale));

// 坐标轴标签
svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('Position (Mb)');

svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2)
    .attr('y', -50)
    .attr('text-anchor', 'middle')
    .text('-log10(P-value)');

// 阈值线
const thresholds = [
    {value: -Math.log10(0.05), color: '#e74c3c', label: 'P=0.05'},
    {value: -Math.log10(0.01), color: '#8B0000', label: 'P=0.01'}
];

thresholds.forEach(t => {
    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))
            .attr('y2', yScale(t.value))
            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }
});

// 绘制点
const tooltip = d3.select('#tooltip');

svg.selectAll('circle')
    .data(data)
    .enter()
    .append('circle')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', d => yScale(d.logp))
    .attr('r', 5)
    .attr('fill', d => {
        if (d.pvalue < 0.01) return '#8B0000';
        if (d.pvalue < 0.05) return '#e74c3c';
        return '#3498db';
    })
    .attr('opacity', 0.7)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('opacity', 1);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue.toExponential(2)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px')
               .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('opacity', 0.7);
        tooltip.style('display', 'none');
    });
</script>
</body>
</html>
