<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr4H:470,666,959 - 470,673,735 | Gene: 470,666,959 - 470,673,735 | Variants: 74</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 470667102, "pvalue": 0.005841932016873078, "logp": 2.23344350125988, "significant": true}, {"pos": 470667185, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667203, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667207, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667246, "pvalue": 0.09713526122578447, "logp": 1.0126230875388385, "significant": false}, {"pos": 470667250, "pvalue": 0.5665990668335183, "logp": 0.24672414508100238, "significant": false}, {"pos": 470667307, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667549, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667637, "pvalue": 0.4400433280332031, "logp": 0.3565045594244828, "significant": false}, {"pos": 470667660, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667721, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667734, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667747, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667763, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470667833, "pvalue": 0.005841932016873078, "logp": 2.23344350125988, "significant": true}, {"pos": 470667837, "pvalue": 0.028337511370811738, "logp": 1.5476382925988252, "significant": true}, {"pos": 470667849, "pvalue": 0.02451844095543235, "logp": 1.6105071485899631, "significant": true}, {"pos": 470667859, "pvalue": 0.040953471255689, "logp": 1.3877092811245975, "significant": true}, {"pos": 470668010, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668111, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668145, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668188, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668240, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668244, "pvalue": 0.005841932016873078, "logp": 2.23344350125988, "significant": true}, {"pos": 470668298, "pvalue": 0.0966596446782597, "logp": 1.0147548056647024, "significant": false}, {"pos": 470668307, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668333, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668337, "pvalue": 0.4400433280332031, "logp": 0.3565045594244828, "significant": false}, {"pos": 470668366, "pvalue": 1.2964205535370362e-06, "logp": 5.887254092251862, "significant": true}, {"pos": 470668511, "pvalue": 0.2934104255998151, "logp": 0.5325244586589677, "significant": false}, {"pos": 470668547, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668580, "pvalue": 0.0014786960771955779, "logp": 2.8301210792555747, "significant": true}, {"pos": 470668622, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668630, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668646, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668750, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668778, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668797, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668835, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668862, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470668898, "pvalue": 0.0669198586219722, "logp": 1.1744449852195384, "significant": false}, {"pos": 470668957, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470669515, "pvalue": 0.0669198586219722, "logp": 1.1744449852195384, "significant": false}, {"pos": 470669540, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470669713, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470669784, "pvalue": 0.0669198586219722, "logp": 1.1744449852195384, "significant": false}, {"pos": 470669929, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670131, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670133, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670291, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670403, "pvalue": 0.005841932016873078, "logp": 2.23344350125988, "significant": true}, {"pos": 470670642, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670694, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670817, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470670951, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671057, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671135, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671220, "pvalue": 0.02915033633984742, "logp": 1.5353564299376572, "significant": true}, {"pos": 470671249, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671325, "pvalue": 0.4400433280332031, "logp": 0.3565045594244828, "significant": false}, {"pos": 470671790, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671821, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470671997, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470672130, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470672452, "pvalue": 0.2934104255998151, "logp": 0.5325244586589677, "significant": false}, {"pos": 470672484, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470672699, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470673027, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470673367, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470673429, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470673476, "pvalue": 0.4400433280332031, "logp": 0.3565045594244828, "significant": false}, {"pos": 470673532, "pvalue": 0.5947014746953048, "logp": 0.22570098456909438, "significant": false}, {"pos": 470673579, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 470673583, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 470666959;
const regionEnd = 470673735;
const geneStart = 470666959;
const geneEnd = 470673735;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游2kb）
const promoterEnd = geneStart;
const promoterStart = Math.max(regionStart, geneStart - 2000);
if (promoterStart < promoterEnd) {
    svg.append('rect')
        .attr('class', 'promoter-region')
        .attr('x', xScale(promoterStart))
        .attr('y', geneY - geneH/2)
        .attr('width', xScale(promoterEnd) - xScale(promoterStart))
        .attr('height', geneH)
        .attr('rx', 2)
        .attr('stroke', '#e67e22')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
