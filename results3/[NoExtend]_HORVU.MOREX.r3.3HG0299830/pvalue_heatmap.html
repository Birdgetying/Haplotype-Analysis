<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P-value Heatmap - Gene Region</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
        .header p { font-size: 13px; color: #7f8c8d; }
        #heatmap { width: 100%; height: 300px; }
        .color-scale { display: flex; align-items: center; gap: 15px; margin-top: 20px; padding: 15px;
                       background: #f8f9fa; border-radius: 8px; }
        .color-scale-bar { width: 200px; height: 20px; border-radius: 3px; }
        .color-scale-labels { display: flex; justify-content: space-between; width: 200px; font-size: 11px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .gene-structure { fill: #3498db; }
        .promoter-region { fill: #f39c12; opacity: 0.5; }
        .axis text { font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P-value Heatmap Overlay</h1>
        <p>Region: chr3H:538,604,770 - 538,609,369 | Gene: 538,604,770 - 538,607,369 | Variants: 75</p>
    </div>
    
    <div id="heatmap"></div>
    
    <div class="color-scale">
        <span style="font-size:13px;font-weight:600;">-log10(P-value):</span>
        <div>
            <div class="color-scale-bar" style="background: linear-gradient(to right, #ffffcc, #fd8d3c, #bd0026);"></div>
            <div class="color-scale-labels"><span>0 (ns)</span><span>1.3 (P=0.05)</span><span>2+ (P&lt;0.01)</span></div>
        </div>
        <span style="margin-left:20px;font-size:12px;color:#666;">Significant variants shown as larger circles</span>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 538604791, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538604818, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538604917, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605133, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605393, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605519, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605570, "pvalue": 0.08944811444876134, "logp": 1.0484288098549002, "significant": false}, {"pos": 538605588, "pvalue": 0.07069944930302448, "logp": 1.1505839690261435, "significant": false}, {"pos": 538605600, "pvalue": 0.013600337050726254, "logp": 1.8664503285814962, "significant": true}, {"pos": 538605621, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605774, "pvalue": 0.7052998193835439, "logp": 0.15162622737153356, "significant": false}, {"pos": 538605822, "pvalue": 0.008547236203411059, "logp": 2.06817429411965, "significant": true}, {"pos": 538605873, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605891, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538605957, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606116, "pvalue": 0.08944811444876134, "logp": 1.0484288098549002, "significant": false}, {"pos": 538606197, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606296, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606444, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606475, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606487, "pvalue": 4.165990002084929e-06, "logp": 5.380281776645727, "significant": true}, {"pos": 538606544, "pvalue": 7.714550018476081e-07, "logp": 6.112689400798777, "significant": true}, {"pos": 538606647, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606803, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606842, "pvalue": 5.337150095440152e-07, "logp": 6.272690583461204, "significant": true}, {"pos": 538606845, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606856, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606868, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606879, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606912, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606945, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606969, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538606987, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607035, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607130, "pvalue": 0.6292416339691298, "logp": 0.20118254986811063, "significant": false}, {"pos": 538607133, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607161, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607184, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607195, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607281, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607349, "pvalue": 1.6458750735486568e-06, "logp": 5.783603132020138, "significant": true}, {"pos": 538607436, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607590, "pvalue": 0.0011017023679743322, "logp": 2.957935717104033, "significant": true}, {"pos": 538607608, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607685, "pvalue": 0.47694101540222134, "logp": 0.321535328023429, "significant": false}, {"pos": 538607687, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607732, "pvalue": 0.3451011215590939, "logp": 0.4620536292737577, "significant": false}, {"pos": 538607752, "pvalue": 0.00028337941728134354, "logp": 3.5476316970870037, "significant": true}, {"pos": 538607825, "pvalue": 2.3291612258702648e-05, "logp": 4.632800448312746, "significant": true}, {"pos": 538607840, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607874, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538607971, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608266, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608329, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608427, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608453, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608454, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608458, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608508, "pvalue": 0.0012163285053092211, "logp": 2.9149491152150238, "significant": true}, {"pos": 538608577, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608587, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608599, "pvalue": 0.7438761966608579, "logp": 0.12849933808451522, "significant": false}, {"pos": 538608759, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608776, "pvalue": 0.6119675078381956, "logp": 0.21327163592826787, "significant": false}, {"pos": 538608791, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608892, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608939, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538608941, "pvalue": 0.0025948415245796086, "logp": 2.585889160783629, "significant": true}, {"pos": 538609010, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609024, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609080, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609146, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609244, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609265, "pvalue": 1.0, "logp": -0.0, "significant": false}, {"pos": 538609282, "pvalue": 1.0, "logp": -0.0, "significant": false}];
const regionStart = 538604770;
const regionEnd = 538609369;
const geneStart = 538604770;
const geneEnd = 538607369;

const margin = {top: 50, right: 30, bottom: 50, left: 60};
const container = document.getElementById('heatmap');
const width = container.clientWidth - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select('#heatmap')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([regionStart, regionEnd])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp), 2) : 2;

// 颜色比例尺 (黄-橙-红)
const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
    .domain([0, maxLogP]);

// 绘制区域背景
svg.append('rect')
    .attr('x', 0)
    .attr('y', height * 0.3)
    .attr('width', width)
    .attr('height', height * 0.4)
    .attr('fill', '#f8f9fa')
    .attr('rx', 4);

// 绘制基因结构
const geneX1 = xScale(geneStart);
const geneX2 = xScale(geneEnd);
const geneY = height * 0.5;
const geneH = height * 0.15;

// 基因主体
svg.append('rect')
    .attr('class', 'gene-structure')
    .attr('x', geneX1)
    .attr('y', geneY - geneH/2)
    .attr('width', geneX2 - geneX1)
    .attr('height', geneH)
    .attr('rx', 3);

// 启动子区域（基因5'端上游）- **根据实际扩展情况绘制**
if (hasPromoter) {
    // 从 gene_info.json 中读取实际启动子长度
    var promoterActualLength = 2000;
    var promoterEnd = geneStart;
    var promoterStart = Math.max(regionStart, geneStart - promoterActualLength);
    if (promoterStart < promoterEnd) {
        svg.append('rect')
            .attr('class', 'promoter-region')
            .attr('x', xScale(promoterStart))
            .attr('y', geneY - geneH/2)
            .attr('width', xScale(promoterEnd) - xScale(promoterStart))
            .attr('height', geneH)
            .attr('rx', 2)
            .attr('stroke', '#e67e22')
            .attr('stroke-width', 1)
            .attr('stroke-dasharray', '3,2');
    }
}

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height * 0.85})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000).toFixed(0) + 'k'));

svg.append('text')
    .attr('x', width / 2)
    .attr('y', height + 5)
    .attr('text-anchor', 'middle')
    .attr('font-size', '12px')
    .attr('fill', '#333')
    .text('Position (bp)');

// 热图点
const tooltip = d3.select('#tooltip');

svg.selectAll('.heatmap-point')
    .data(data)
    .enter()
    .append('circle')
    .attr('class', 'heatmap-point')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', geneY - geneH - 15)  // 在基因上方
    .attr('r', d => d.significant ? 7 : 4)
    .attr('fill', d => colorScale(d.logp))
    .attr('stroke', d => d.significant ? '#000' : 'none')
    .attr('stroke-width', d => d.significant ? 1.5 : 0)
    .attr('opacity', 0.85)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', d.significant ? 10 : 6);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue < 0.001 ? d.pvalue.toExponential(2) : d.pvalue.toFixed(4)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}<br>
                   <strong>Significant:</strong> ${d.significant ? 'Yes' : 'No'}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px').style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function(event, d) {
        d3.select(this).attr('r', d.significant ? 7 : 4);
        tooltip.style('display', 'none');
    });

// 连接线（从热图点到基因位置）
svg.selectAll('.connect-line')
    .data(data.filter(d => d.significant))
    .enter()
    .append('line')
    .attr('class', 'connect-line')
    .attr('x1', d => xScale(d.pos))
    .attr('y1', geneY - geneH - 8)
    .attr('x2', d => xScale(d.pos))
    .attr('y2', geneY - geneH/2 - 2)
    .attr('stroke', d => colorScale(d.logp))
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,2');

// 标题和图例
svg.append('text')
    .attr('x', 0)
    .attr('y', -25)
    .attr('font-size', '14px')
    .attr('font-weight', '600')
    .attr('fill', '#2c3e50')
    .text('P-value Distribution Across Gene Region');

// 区域标签
svg.append('text')
    .attr('x', (geneX1 + geneX2) / 2)
    .attr('y', geneY + geneH/2 + 15)
    .attr('text-anchor', 'middle')
    .attr('font-size', '11px')
    .attr('fill', '#2c3e50')
    .text('Gene Body');

if (promoterStart < promoterEnd) {
    svg.append('text')
        .attr('x', (xScale(promoterStart) + xScale(promoterEnd)) / 2)
        .attr('y', geneY + geneH/2 + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '10px')
        .attr('fill', '#e67e22')
        .text('Promoter');
}
</script>
</body>
</html>
