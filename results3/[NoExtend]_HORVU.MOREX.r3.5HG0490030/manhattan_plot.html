<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manhattan Plot - Region chr5H:475,299,193-475,315,839</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;
                  padding: 20px 30px; border-radius: 10px 10px 0 0; }
        .header h1 { font-size: 22px; margin-bottom: 8px; }
        .header-info { font-size: 13px; opacity: 0.9; }
        .plot-container { padding: 30px; }
        #manhattan { width: 100%; height: 450px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 12px;
                   border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; }
        .axis text { font-size: 11px; }
        .axis-label { font-size: 13px; font-weight: 600; }
        .threshold-line { stroke-dasharray: 5,5; }
        .legend { display: flex; gap: 20px; padding: 15px 30px; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Manhattan Plot</h1>
        <div class="header-info">Region: chr5H:475,299,193 - 475,315,839 | Variants: 39</div>
    </div>
    
    <div class="plot-container">
        <div id="manhattan"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3498db;"></div>Variants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>P &lt; 0.05</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8B0000;"></div>P &lt; 0.01</div>
        <div class="legend-item"><span style="color:#e74c3c;">---</span> P = 0.05</div>
        <div class="legend-item"><span style="color:#8B0000;">---</span> P = 0.01</div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const data = [{"pos": 475299228, "pvalue": 0.009197710215633969, "logp": 2.0363202774901437, "type": "variant"}, {"pos": 475299328, "pvalue": 5.693090236474687e-05, "logp": 4.2446519324905, "type": "variant"}, {"pos": 475299467, "pvalue": 0.03557074453809092, "logp": 1.4489070444178072, "type": "variant"}, {"pos": 475300798, "pvalue": 0.005293449337354335, "logp": 2.276261239118352, "type": "variant"}, {"pos": 475302430, "pvalue": 0.002759636699002958, "logp": 2.5591480882259146, "type": "variant"}, {"pos": 475302534, "pvalue": 0.16996290106600057, "logp": 0.7696458646253393, "type": "variant"}, {"pos": 475303286, "pvalue": 0.8517319580285567, "logp": 0.06969705718671095, "type": "variant"}, {"pos": 475303290, "pvalue": 0.24280654568133242, "logp": 0.6147396095450315, "type": "variant"}, {"pos": 475303508, "pvalue": 3.5129225431953954e-09, "logp": 8.454331425907855, "type": "variant"}, {"pos": 475303649, "pvalue": 0.9638558389864689, "logp": 0.015987917357043264, "type": "variant"}, {"pos": 475303795, "pvalue": 0.033450581419466476, "logp": 1.4755963291645744, "type": "variant"}, {"pos": 475303952, "pvalue": 0.028079814198584796, "logp": 1.551605770217315, "type": "variant"}, {"pos": 475304503, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 475305925, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 475307266, "pvalue": 0.9224856228003908, "logp": 0.03504039371861694, "type": "variant"}, {"pos": 475307719, "pvalue": 1.0, "logp": -0.0, "type": "variant"}, {"pos": 475307872, "pvalue": 0.013996972476003303, "logp": 1.8539658914041883, "type": "variant"}, {"pos": 475308173, "pvalue": 0.02221034458775583, "logp": 1.653444703432617, "type": "variant"}, {"pos": 475308219, "pvalue": 0.00016351147174667238, "logp": 3.7864517724134554, "type": "variant"}, {"pos": 475308250, "pvalue": 0.013996972476003303, "logp": 1.8539658914041883, "type": "variant"}, {"pos": 475308770, "pvalue": 0.005293449337354335, "logp": 2.276261239118352, "type": "variant"}, {"pos": 475309542, "pvalue": 0.300836777838871, "logp": 0.5216690715507741, "type": "variant"}, {"pos": 475309553, "pvalue": 0.01230738605678488, "logp": 1.9098341762855455, "type": "variant"}, {"pos": 475309811, "pvalue": 0.00016351147174667238, "logp": 3.7864517724134554, "type": "variant"}, {"pos": 475310291, "pvalue": 5.060796446197365e-10, "logp": 9.295781130399387, "type": "variant"}, {"pos": 475310303, "pvalue": 0.009761191832491085, "logp": 2.0104971521413697, "type": "variant"}, {"pos": 475310316, "pvalue": 0.012134977735178637, "logp": 1.9159610161592346, "type": "variant"}, {"pos": 475310378, "pvalue": 0.0466226546729053, "logp": 1.3314030015796994, "type": "variant"}, {"pos": 475310485, "pvalue": 0.957616016561618, "logp": 0.018808598768981687, "type": "variant"}, {"pos": 475310508, "pvalue": 0.8982418595023189, "logp": 0.04660670998665028, "type": "variant"}, {"pos": 475311795, "pvalue": 0.009761191832491085, "logp": 2.0104971521413697, "type": "variant"}, {"pos": 475312110, "pvalue": 0.26189645175093634, "logp": 0.5818703854824714, "type": "variant"}, {"pos": 475312190, "pvalue": 0.002759636699002958, "logp": 2.5591480882259146, "type": "variant"}, {"pos": 475312196, "pvalue": 0.05708070812441343, "logp": 1.2435106478100595, "type": "variant"}, {"pos": 475312520, "pvalue": 0.8982418595023189, "logp": 0.04660670998665028, "type": "variant"}, {"pos": 475312533, "pvalue": 0.10943519067008967, "logp": 0.9608430010711095, "type": "variant"}, {"pos": 475312543, "pvalue": 0.01230738605678488, "logp": 1.9098341762855455, "type": "variant"}, {"pos": 475312545, "pvalue": 0.07929708675088881, "logp": 1.1007427676792938, "type": "variant"}, {"pos": 475312618, "pvalue": 0.018536430398503254, "logp": 1.7319738951910568, "type": "variant"}];
const margin = {top: 30, right: 40, bottom: 60, left: 70};
const container = document.getElementById('manhattan');
const width = container.clientWidth - margin.left - margin.right;
const height = 450 - margin.top - margin.bottom;

const svg = d3.select('#manhattan')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// 比例尺
const xScale = d3.scaleLinear()
    .domain([475299193, 475315839])
    .range([0, width]);

const maxLogP = data.length > 0 ? Math.max(...data.map(d => d.logp)) * 1.1 : 5;
const yScale = d3.scaleLinear()
    .domain([0, Math.max(maxLogP, 3)])
    .range([height, 0]);

// 坐标轴
svg.append('g')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(10).tickFormat(d => (d/1000000).toFixed(2) + 'M'));

svg.append('g')
    .call(d3.axisLeft(yScale));

// 坐标轴标签
svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('Position (Mb)');

svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2)
    .attr('y', -50)
    .attr('text-anchor', 'middle')
    .text('-log10(P-value)');

// 阈值线
const thresholds = [
    {value: -Math.log10(0.05), color: '#e74c3c', label: 'P=0.05'},
    {value: -Math.log10(0.01), color: '#8B0000', label: 'P=0.01'}
];

thresholds.forEach(t => {
    if (t.value <= maxLogP) {
        svg.append('line')
            .attr('class', 'threshold-line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', yScale(t.value))
            .attr('y2', yScale(t.value))
            .attr('stroke', t.color)
            .attr('stroke-width', 1.5);
    }
});

// 绘制点
const tooltip = d3.select('#tooltip');

svg.selectAll('circle')
    .data(data)
    .enter()
    .append('circle')
    .attr('cx', d => xScale(d.pos))
    .attr('cy', d => yScale(d.logp))
    .attr('r', 5)
    .attr('fill', d => {
        if (d.pvalue < 0.01) return '#8B0000';
        if (d.pvalue < 0.05) return '#e74c3c';
        return '#3498db';
    })
    .attr('opacity', 0.7)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('opacity', 1);
        tooltip.style('display', 'block')
            .html(`<strong>Position:</strong> ${d.pos.toLocaleString()}<br>
                   <strong>P-value:</strong> ${d.pvalue.toExponential(2)}<br>
                   <strong>-log10(P):</strong> ${d.logp.toFixed(2)}`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 15) + 'px')
               .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('opacity', 0.7);
        tooltip.style('display', 'none');
    });
</script>
</body>
</html>
